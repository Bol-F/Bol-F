name: Update profile README

on:
  workflow_dispatch:
  schedule:
    # 06:17 UTC / 11:17 in Tashkent every Monday
    - cron: "17 6 * * 1"

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Update dynamic project list
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: ${{ github.repository_owner }}
        run: python scripts/update_profile.py

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "README is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update profile README"
          git push
